<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Congress Bills Explorer</title>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body {
    font-family: Arial;
    display: flex;
    height: 100vh;
    margin: 0;
}

#left {
    width: 30%;
    border-right: 1px solid #ccc;
    overflow-y: auto;
    padding: 10px;
}

#right {
    width: 70%;
    padding: 10px;
    overflow-y: auto;
}

.bill {
    padding: 8px;
    margin: 4px;
    cursor: pointer;
    border: 1px solid #ddd;
}

.bill:hover {
    background: #f2f2f2;
}

.action {
    padding: 6px;
    margin: 4px 0;
    border-left: 3px solid steelblue;
}
</style>
</head>

<body>

<div id="left">
    <h3>Bills</h3>
</div>

<div id="right">
    <h3>Actions</h3>
    <div id="actions"></div>
</div>

<script>

// -------------------------
// LOAD DATA
// -------------------------
d3.json("bills_actions.json").then(data => {

    // group by bill_number
    const bills = d3.group(data, d => d.bill_number);

    const left = d3.select("#left");

    // -------------------------
    // BUILD BILL LIST
    // -------------------------
    left.selectAll(".bill")
        .data([...bills.keys()])
        .enter()
        .append("div")
        .attr("class", "bill")
        .text(d => "Bill " + d)
        .on("click", function(event, billNum) {
            showBill(billNum, bills.get(billNum));
        });

    // default view
    const first = [...bills.keys()][0];
    showBill(first, bills.get(first));

});

// -------------------------
// SHOW BILL DETAILS
// -------------------------
function showBill(billNum, records) {

    const container = d3.select("#actions");
    container.html("");

    container.append("h4")
        .text("Bill " + billNum);

    records.forEach(r => {
        container.append("div")
            .attr("class", "action")
            .html(`
                <b>${r.action_date || ""}</b> ${r.action_time || ""}<br/>
                ${r.text || ""}<br/>
                <small>${r.action_type || ""}</small>
            `);
    });
}

</script>

</body>
</html>
