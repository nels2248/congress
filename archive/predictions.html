<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Congress Vote Predictions</title>

<style>
body {
  font-family: system-ui, sans-serif;
  margin: 20px;
  background: #f6f6f6;
}

h1 { margin-bottom: 5px; }

.small {
  color: #666;
  font-size: 13px;
  margin-bottom: 15px;
}

/* summary */
.summary {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 15px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  min-width: 140px;
}

.card .val {
  font-size: 16px;
  font-weight: 700;
}

.card .lbl {
  font-size: 12px;
  color: #666;
}

/* table */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid #eee;
  font-size: 12px;
  text-align: left;
}

th {
  background: #fafafa;
}

.model-pill {
  display: inline-block;
  padding: 2px 6px;
  margin-right: 4px;
  border-radius: 6px;
  font-size: 11px;
  color: white;
}

.rf { background: #1976d2; }
.et { background: #2e7d32; }
.gb { background: #ef6c00; }
.lr { background: #6a1b9a; }

.error {
  background: #ffebee;
  color: #b71c1c;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<h1>Congress Vote Predictions (Multi-Model)</h1>

<div class="small" id="meta">Loading...</div>

<div id="error" class="error" style="display:none"></div>

<div class="summary" id="summary"></div>

<table>
<thead>
<tr>
  <th>Bill</th>
  <th>Party</th>
  <th>State</th>
  <th>RF</th>
  <th>ET</th>
  <th>GB</th>
  <th>LR</th>
  <th>Best</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<script>

let DATA = null;

async function load() {
  try {
    const res = await fetch("data/predictions.json");

    console.log("Fetch status:", res.status);

    if (!res.ok) throw new Error("HTTP " + res.status);

    DATA = await res.json();

    console.log("Loaded JSON:", DATA);

    document.getElementById("meta").innerText =
      `Generated: ${DATA.generated_at} | AUC: ${DATA.metrics?.auc} | Best Model: ${DATA.metrics?.best_model}`;

    buildSummary(DATA);

    const rows =
      DATA.top_100 ||
      DATA.all_bills ||
      [];

    console.log("Rows found:", rows.length);

    render(rows);

  } catch (e) {
    console.error(e);
    document.getElementById("error").style.display = "block";
    document.getElementById("error").innerText =
      "Failed to load predictions.json → " + e.message;
  }
}

function buildSummary(data) {
  const m = data.metrics || {};

  document.getElementById("summary").innerHTML = `
    <div class="card">
      <div class="val">${m.best_model || "?"}</div>
      <div class="lbl">Best Model</div>
    </div>

    <div class="card">
      <div class="val">${(m.auc ?? 0).toFixed(3)}</div>
      <div class="lbl">AUC</div>
    </div>

    <div class="card">
      <div class="val">${(m.cv_auc ?? 0).toFixed(3)}</div>
      <div class="lbl">CV AUC</div>
    </div>

    <div class="card">
      <div class="val">${(m.n_samples ?? 0).toLocaleString()}</div>
      <div class="lbl">Samples</div>
    </div>

    <div class="card">
      <div class="val">${((m.positive_rate ?? 0) * 100).toFixed(1)}%</div>
      <div class="lbl">Positive Rate</div>
    </div>
  `;
}

function pill(cls, val) {
  return `<span class="model-pill ${cls}">${(val ?? 0).toFixed(1)}%</span>`;
}

function render(rows) {

  if (!rows || rows.length === 0) {
    document.getElementById("rows").innerHTML =
      `<tr><td colspan="8">No data loaded (check JSON structure)</td></tr>`;
    return;
  }

  document.getElementById("rows").innerHTML = rows.map(r => `
    <tr>
      <td>${r.bill_id}</td>
      <td>${r.sponsor_party}</td>
      <td>${r.sponsor_state}</td>

      <td>${pill("rf", r.rf)}</td>
      <td>${pill("et", r.et)}</td>
      <td>${pill("gb", r.gb)}</td>
      <td>${pill("lr", r.lr)}</td>

      <td><b>${r.best || "?"}</b></td>
    </tr>
  `).join("");
}

load();

</script>

</body>
</html>
