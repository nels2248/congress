<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Bill Intelligence Dashboard</title>

<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body { font-family: Arial; margin: 0; background: #f5f6fa; }

.header {
    background: #111827;
    color: white;
    padding: 10px;
}

/* SUMMARY */
.summary {
    display: flex;
    gap: 20px;
    padding: 10px;
    background: #fff;
    border-bottom: 1px solid #ddd;
    font-size: 13px;
}

/* FILTERS */
.filters {
    display: flex;
    gap: 10px;
    padding: 10px;
    background: white;
    border-bottom: 1px solid #ddd;
}

input, select {
    padding: 6px;
    font-size: 12px;
}

/* LAYOUT */
.container {
    display: flex;
    height: calc(100vh - 160px);
}

.left { width: 60%; background: white; overflow: auto; }
.right { width: 40%; border-left: 1px solid #ddd; padding: 12px; overflow: auto; }

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 7px;
    font-size: 12px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
}

th {
    background: #f3f4f6;
    position: sticky;
    top: 0;
}

tr:hover { background: #eef6ff; }

/* PAGINATION */
.pagination {
    padding: 10px;
    text-align: center;
    background: #fff;
    border-top: 1px solid #ddd;
}

.page-btn {
    margin: 2px;
    padding: 4px 8px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid #ccc;
    background: #fff;
}

.page-btn.active {
    background: #111827;
    color: white;
}

/* DETAILS */
.card {
    background: white;
    border: 1px solid #eee;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 6px;
}

.timeline {
    max-height: 300px;
    overflow-y: auto;
    font-size: 12px;
}
</style>
</head>

<body>

<div style="
    background:#111827;
    color:white;
    padding:10px;
    display:flex;
    gap:15px;
    align-items:center;
    font-family:Arial;
">
    <div style="font-weight:bold;">Congress Dashboard</div>
	<a href="index.html" style="color:white;text-decoration:none;">Project Explanation</a>
    <a href="details.html" style="color:white;text-decoration:none;">Details</a>
    <a href="cluster_groups.html" style="color:white;text-decoration:none;">Clusters</a>
    <a href="ml_dashboard.html" style="color:white;text-decoration:none;">ML Dashboard</a>
</div>

<div class="header">Bill Intelligence Dashboard</div>

<!-- SUMMARY -->
<div class="summary" id="summary"></div>

<!-- FILTERS -->
<div class="filters">
    <input id="search" placeholder="Search title..." oninput="applyFilters()" />

    <select id="stageFilter" onchange="applyFilters()">
        <option value="">All Stages</option>
        <option>🟡 Introduced</option>
        <option>⚪ Low Activity</option>
        <option>🟠 Moderate Activity</option>
        <option>🔵 Fast Moving</option>
        <option>🟣 High Support</option>
    </select>

    <input id="minCos" type="number" placeholder="Min Cosponsors" oninput="applyFilters()" />
</div>

<div class="container">

<div class="left">
<table>
<thead>
<tr>
<th onclick="sortBy('bill_number')">Bill ⬍</th>
<th>Title</th>
<th>Sponsor</th>
<th>Cosponsors</th>
<th>Stage</th>
</tr>
</thead>

<tbody id="rows"></tbody>
</table>

<div class="pagination" id="pagination"></div>

</div>

<div class="right" id="details">Click a bill</div>

</div>

<script>

let data = [];
let filtered = [];
let currentPage = 1;
let pageSize = 25;
let sortAsc = true;

d3.json("cluster_results.json").then(d => {
    data = d.bills;

    // force numeric bill sort safety
    data.forEach(d => d.bill_number = +d.bill_number);

    filtered = data;

    render();
    renderSummary();
});

// ----------------------------
// SUMMARY TOP BAR
// ----------------------------
function renderSummary(){

    let total = data.length;

    let avgCos = d3.mean(data, d => d.cosponsor_count || 0);
    let avgVel = d3.mean(data, d => d.velocity || 0);

    let stageCounts = d3.rollup(
        data,
        v => v.length,
        d => d.stage
    );

    document.getElementById("summary").innerHTML = `
        <div>Total Bills: <b>${total}</b></div>
        <div>Avg Cosponsors: <b>${avgCos.toFixed(1)}</b></div>
        <div>Avg Velocity: <b>${avgVel.toFixed(2)}</b></div>
        <div>Stages: <b>${Array.from(stageCounts.entries()).map(d => d[0] + ":" + d[1]).join(" | ")}</b></div>
    `;
}

// ----------------------------
// FILTERS
// ----------------------------
function applyFilters(){

    let search = document.getElementById("search").value.toLowerCase();
    let stage = document.getElementById("stageFilter").value;
    let minCos = +document.getElementById("minCos").value || 0;

    filtered = data.filter(d => {
        return (!search || (d.title || "").toLowerCase().includes(search)) &&
               (!stage || d.stage === stage) &&
               ((d.cosponsor_count || 0) >= minCos);
    });

    currentPage = 1;
    render();
}

// ----------------------------
// SORT
// ----------------------------
function sortBy(field){

    sortAsc = !sortAsc;

    filtered.sort((a,b) => {
        return sortAsc
            ? a[field] - b[field]
            : b[field] - a[field];
    });

    render();
}

// ----------------------------
// PAGINATION
// ----------------------------
function paginate(arr){

    let start = (currentPage - 1) * pageSize;
    let end = start + pageSize;

    return arr.slice(start, end);
}

function renderPagination(){

    let pages = Math.ceil(filtered.length / pageSize);
    let html = "";

    for(let i=1;i<=pages;i++){
        html += `<button class="page-btn ${i===currentPage?'active':''}"
                    onclick="goPage(${i})">${i}</button>`;
    }

    document.getElementById("pagination").innerHTML = html;
}

function goPage(p){
    currentPage = p;
    render();
}

// ----------------------------
// TABLE RENDER
// ----------------------------
function render(){

    let pageData = paginate(filtered);

    let rows = d3.select("#rows")
        .selectAll("tr")
        .data(pageData, d => d.bill_number);

    rows.exit().remove();

    let enter = rows.enter()
        .append("tr")
        .on("click", (e, d) => show(d));

    rows = enter.merge(rows);

    rows.html("");

    rows.append("td").text(d => d.bill_number);
    rows.append("td").text(d => d.title);
    rows.append("td").text(d => d.sponsor || "Unknown");
    rows.append("td").text(d => d.cosponsor_count || 0);
    rows.append("td").text(d => d.stage);

    renderPagination();
}

// ----------------------------
// DETAILS
// ----------------------------
function show(d){

    let cos = (d.cosponsor_list || []).map(x => `<div>• ${x}</div>`).join("");

    let timeline = (d.actions_timeline || []).map(a =>
        `<div><b>${a.action_date}</b><br/>${a.text || ""}</div><hr/>`
    ).join("");

    document.getElementById("details").innerHTML = `
        <div class="card">
            <h3>${d.bill_number}</h3>
            ${d.title}
        </div>

        <div class="card">
            <b>Sponsor</b><br/>
            ${d.sponsor || "Unknown"}
        </div>

        <div class="card">
            <b>Cosponsors</b><br/>
            ${cos || "None"}
        </div>

        <div class="card">
            <b>Stage</b><br/>
            ${d.stage}
        </div>

        <div class="card">
            <b>Activity</b><br/>
            Actions: ${d.early_action_count}<br/>
            Velocity: ${d.velocity}<br/>
            Span Days: ${d.span_days}
        </div>

        <div class="card">
            <b>Timeline</b>
            <div class="timeline">${timeline}</div>
        </div>
    `;
}

</script>

</body>
</html>
