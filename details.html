<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Congress Dashboard</title>
<script src="https://d3js.org/d3.v7.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f7f7f7;
}

/* NAV */
.nav {
    background:#111827;
    color:white;
    padding:10px;
    display:flex;
    gap:15px;
    align-items:center;
}

.nav a {
    color:white;
    text-decoration:none;
}

/* CONTROLS */
#controls {
    padding: 10px;
    background: white;
    border-bottom: 1px solid #ddd;
    display: flex;
    gap: 10px;
    align-items: center;
}

input, select {
    padding: 6px;
    font-size: 13px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    font-size: 13px;
}

th {
    background: #f1f1f1;
    cursor: pointer;
    position: sticky;
    top: 0;
}

tr:hover {
    background: #f5f5f5;
    cursor: pointer;
}

/* PAGINATION */
#pagination {
    padding: 10px;
    background: white;
    border-top: 1px solid #ddd;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* MODAL */
#modal {
    position: fixed;
    inset: 0;
    display: none;
    background: rgba(0,0,0,0.5);
    align-items: center;
    justify-content: center;
}

#modalContent {
    background: white;
    width: 75%;
    max-height: 85%;
    overflow-y: auto;
    padding: 20px;
    border-radius: 8px;
    position: relative;
}

#closeBtn {
    position: absolute;
    top: 10px;
    right: 15px;
    cursor: pointer;
    font-size: 18px;
}

.section {
    margin-top: 15px;
}

.action {
    border-left: 3px solid steelblue;
    padding: 6px;
    margin: 6px 0;
    font-size: 13px;
}

.cosponsor {
    border: 1px solid #ddd;
    padding: 6px;
    margin: 4px;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="nav">
    <div style="font-weight:bold;">Congress Dashboard</div>
	<a href="index.html">Project Explanation</a>
	<a href="details.html">Details</a>    
    <a href="cluster_groups.html">Clusters</a>
    <a href="ml_dashboard.html">ML Dashboard</a>
</div>

<!-- CONTROLS -->
<div id="controls">
    <input id="search" placeholder="Search title, sponsor, bill #" />

    <label>Page Size:</label>
    <select id="pageSize">
        <option value="10">10</option>
        <option value="25" selected>25</option>
        <option value="50">50</option>
    </select>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
    <th data-key="bill">Bill</th>
    <th data-key="type">Type</th>
    <th data-key="title">Title</th>
    <th data-key="sponsor">Sponsor</th>
    <th data-key="actions">Actions</th>
    <th data-key="cosponsors">Co-Sponsors</th>
</tr>
</thead>
<tbody></tbody>
</table>

<!-- PAGINATION -->
<div id="pagination">
    <button id="prev">Prev</button>
    <div id="pageInfo"></div>
    <button id="next">Next</button>
</div>

<!-- MODAL -->
<div id="modal">
    <div id="modalContent">
        <div id="closeBtn">✖</div>

        <h2 id="title"></h2>

        <div class="section">
            <h3>Sponsor</h3>
            <div id="sponsor"></div>
        </div>

        <div class="section">
            <h3>Co-Sponsors</h3>
            <div id="cosponsors"></div>
        </div>

        <div class="section">
            <h3>Actions</h3>
            <div id="actions"></div>
        </div>

    </div>
</div>

<script>

d3.json("congress_dashboard.json").then(data => {

    let bills = data.bills;
    const actions = data.actions;
    const cosponsors = data.cosponsors;

    const actionsByBill = d3.group(actions, d => d.bill_number);
    const cosponsorsByBill = d3.group(cosponsors, d => d.bill_number);

    // ---------------- STATE ----------------
    let sortKey = "bill";
    let sortAsc = true;
    let page = 0;
    let pageSize = 25;
    let filtered = bills;

    // ---------------- SAFE STRING ----------------
    function safe(v) {
        return (v === null || v === undefined || v === "null" || v === "NaN") 
            ? "Unknown" 
            : v;
    }

    // ---------------- SEARCH ----------------
    function applySearch() {

        const q = document.getElementById("search").value.toLowerCase();

        filtered = bills.filter(d =>
            !q ||
            (d.title || "").toLowerCase().includes(q) ||
            safe(d.sponsor).toLowerCase().includes(q) ||
            (`${d.bill_type} ${d.bill_number}`).toLowerCase().includes(q)
        );

        page = 0;
        render();
    }

    document.getElementById("search").addEventListener("input", applySearch);

    // ---------------- SORT ----------------
    function sortData(data) {

        return data.slice().sort((a, b) => {

            const dir = sortAsc ? 1 : -1;

            if (sortKey === "actions")
                return dir * ((a.action_count || 0) - (b.action_count || 0));

            if (sortKey === "cosponsors")
                return dir * ((a.cosponsor_count || 0) - (b.cosponsor_count || 0));

            if (sortKey === "title")
                return dir * ((a.title || "").localeCompare(b.title || ""));

            if (sortKey === "type")
                return dir * ((a.bill_type || "").localeCompare(b.bill_type || ""));

            if (sortKey === "sponsor")
                return dir * (safe(a.sponsor).localeCompare(safe(b.sponsor)));

            return dir * ((+a.bill_number) - (+b.bill_number));
        });
    }

    // ---------------- RENDER ----------------
    function render() {

        const sorted = sortData(filtered);

        const start = page * pageSize;
        const pageData = sorted.slice(start, start + pageSize);

        const tbody = d3.select("tbody");
        tbody.html("");

        const rows = tbody.selectAll("tr")
            .data(pageData)
            .enter()
            .append("tr")
            .on("click", (e, d) => openModal(d));

        rows.append("td").text(d => `${d.bill_type} ${d.bill_number}`);
        rows.append("td").text(d => d.bill_type);
        rows.append("td").text(d => d.title || "");
        rows.append("td").text(d => safe(d.sponsor));
        rows.append("td").text(d => d.action_count || 0);
        rows.append("td").text(d => d.cosponsor_count || 0);

        document.getElementById("pageInfo").innerText =
            `Page ${page + 1} of ${Math.ceil(filtered.length / pageSize)}`;
    }

    // ---------------- SORT HEADER CLICK ----------------
    d3.selectAll("th").on("click", function() {

        const key = this.dataset.key;

        if (sortKey === key) {
            sortAsc = !sortAsc;
        } else {
            sortKey = key;
            sortAsc = true;
        }

        page = 0;
        render();
    });

    // ---------------- PAGINATION ----------------
    document.getElementById("pageSize").onchange = function() {
        pageSize = +this.value;
        page = 0;
        render();
    };

    document.getElementById("prev").onclick = () => {
        if (page > 0) page--;
        render();
    };

    document.getElementById("next").onclick = () => {
        if ((page + 1) * pageSize < filtered.length) page++;
        render();
    };

    // ---------------- MODAL ----------------
    const modal = d3.select("#modal");

    document.getElementById("closeBtn").onclick = () =>
        modal.style("display", "none");

    modal.on("click", function(e) {
        if (e.target === this) modal.style("display", "none");
    });

    function openModal(bill) {

        document.getElementById("title").innerText =
            `${bill.bill_type} ${bill.bill_number}`;

        document.getElementById("sponsor").innerText =
            safe(bill.sponsor);

        const cs = cosponsorsByBill.get(bill.bill_number) || [];
        const act = actionsByBill.get(bill.bill_number) || [];

        d3.select("#cosponsors").html("")
            .selectAll("div")
            .data(cs)
            .enter()
            .append("div")
            .attr("class", "cosponsor")
            .html(d => `${d.full_name} (${d.party}-${d.state})`);

        const aDiv = d3.select("#actions");
        aDiv.html("");

        act.forEach(a => {
            aDiv.append("div")
                .attr("class", "action")
                .html(`${a.action_date || ""} - ${a.text || ""}`);
        });

        modal.style("display", "flex");
    }

    render();

});

</script>

</body>
</html>
