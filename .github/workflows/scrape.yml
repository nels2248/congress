name: Nightly Congress Scrape

on:
  schedule:
    - cron: "0 6 * * *"   # 1 AM EST / midnight CST every night
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install httpx duckdb pandas python-dotenv scikit-learn sentence_transformers umap-learn hdbscan nest_asyncio

      # 1. RUN SCRAPER
      - name: Run scraper
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          RUN_MODE: incremental
        run: python scraper.py

      # 2. RUN CLASSIFICATIONS
      - name: Run classifications
        run: python classifications.py

      # 3. RUN TOPIC CLUSTERING
      - name: Run topic clustering
        run: python cluster_topics.py

      # 4. COMMIT RESULTS
      - name: Commit updated DB and JSON exports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add congress.duckdb data/

          git diff --cached --quiet \
            || git commit -m "chore: nightly refresh $(date -u +'%Y-%m-%d')"

          git push