name: Nightly Congress Scrape

on:
  schedule:
    #- cron: "0 6 * * *"   # 1 AM EST / midnight CST every night
  workflow_dispatch:        # manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx duckdb pandas python-dotenv scikit-learn

      - name: Run scraper
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          RUN_MODE: incremental
        run: python scraper.py

      - name: Commit updated DB and JSON exports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add congress.duckdb data/
          git diff --cached --quiet \
            || git commit -m "chore: nightly refresh $(date -u +'%Y-%m-%d')" \
            && git push